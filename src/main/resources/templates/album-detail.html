<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${album.title} + ' — RevPlay'">Album</title>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f0f0f;--bg2:#1a1a2e;--surface:#1e1e2f;--surface2:#24243a;--green:#1db954;--muted:#8888a8;--border:rgba(255,255,255,0.06);--text:#ffffff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:linear-gradient(135deg,var(--bg),var(--bg2)); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; }
    nav { display:flex; justify-content:space-between; align-items:center; padding:18px 60px; background:rgba(0,0,0,0.4); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); }
    .logo { font-size:22px; font-weight:800; color:var(--green); letter-spacing:3px; text-transform:uppercase; text-decoration:none; }
    .page { padding:48px 60px; max-width:1000px; margin:0 auto; }
    .back { color:var(--green); text-decoration:none; font-size:14px; font-weight:600; display:inline-block; margin-bottom:32px; }
    .hero {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px;
  display:flex;
  gap:28px;
  align-items:center;
  margin-bottom:40px;
}
    .art { width:160px; height:160px; border-radius:14px; background:linear-gradient(135deg,#1a1a2e,#0f2a1a); display:flex; align-items:center; justify-content:center; font-size:64px; flex-shrink:0; }
    .hero-info h1 { font-size:28px; font-weight:800; margin-bottom:6px; overflow: hidden;  }
    .hero-info .artist { color:var(--green); font-size:15px; font-weight:600; margin-bottom:10px; text-decoration:none; }
    .hero-info .artist:hover { opacity:.8; }
    .hero-info .desc { color:var(--muted); font-size:14px; line-height:1.6; max-width:500px; margin-bottom:12px; }
    .meta-pill { display:inline-block; background:rgba(255,255,255,0.06); border-radius:100px; padding:5px 14px; font-size:13px; color:var(--muted); }
    .meta-pill span { color:var(--text); font-weight:600; }
    .sec-title { font-size:18px; font-weight:700; margin-bottom:16px; }
    .songs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; }
    .song-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit; transition:background .2s,transform .2s; }
    .song-card:hover { background:var(--surface2); transform:translateY(-2px); }
    .thumb { width:42px; height:42px; border-radius:8px; background:linear-gradient(135deg,#1db954,#0f6e32); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .song-meta b { font-size:14px; display:block; }
    .song-meta span { font-size:12px; color:var(--muted); }
    .plays { font-size:11px; font-weight:600; color:var(--green); background:rgba(29,185,84,0.12); padding:4px 9px; border-radius:100px; margin-left:auto; }
  	:root { --player-h:88px; }
  body  { padding-bottom:var(--player-h); }

  #bp {
    position:fixed; bottom:0; left:0; right:0; height:var(--player-h);
    z-index:500;
    background:rgba(10,10,20,0.97);
    backdrop-filter:blur(28px);
    border-top:1px solid rgba(255,255,255,0.06);
    display:grid;
    grid-template-columns:280px 1fr 280px;
    align-items:center;
    padding:0 24px;
  }
  #bp::before {
    content:''; position:absolute; top:0; left:0;
    height:2px; background:#1db954;
    width:var(--bp-pct,0%); transition:width .1s linear;
  }
  .bp-left  { display:flex; align-items:center; gap:14px; min-width:0; }
  .bp-art   {
    width:54px; height:54px; border-radius:8px; flex-shrink:0;
    background:linear-gradient(135deg,#1db954,#0a3d1f);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; overflow:hidden;
  }
  .bp-art img { width:100%; height:100%; object-fit:fill; border-radius:8px; }
  .bp-song-title  { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bp-song-artist { font-size:12px; color:#8888a8; margin-top:2px; }
  .bp-center { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bp-btns   { display:flex; align-items:center; gap:20px; }
  .bp-btn    { background:none; border:none; color:#8888a8; cursor:pointer; font-size:16px; transition:color .2s; padding:4px; }
  .bp-btn:hover { color:#fff; }
  .bp-play-btn {
    width:36px; height:36px; border-radius:50%; border:none;
    background:#fff; color:#000; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; transition:transform .15s, background .15s;
  }
  .bp-play-btn:hover { transform:scale(1.07); background:#e8e8e8; }
  .bp-seek  { display:flex; align-items:center; gap:8px; width:360px; font-size:11px; color:#8888a8; }
  .bp-bar   { flex:1; height:3px; background:rgba(255,255,255,0.12); border-radius:100px; cursor:pointer; }
  .bp-bar-fill { height:100%; background:#1db954; border-radius:100px; width:0%; pointer-events:none; }
  .bp-right { display:flex; align-items:center; justify-content:flex-end; gap:10px; }
  .bp-vol-btn { background:none; border:none; color:#8888a8; cursor:pointer; font-size:15px; transition:color .2s; }
  .bp-vol-btn:hover { color:#fff; }
  input[type=range].bp-vol {
    -webkit-appearance:none; width:90px; height:3px;
    background:rgba(255,255,255,0.15); border-radius:100px; cursor:pointer; outline:none;
  }
  input[type=range].bp-vol::-webkit-slider-thumb {
    -webkit-appearance:none; width:12px; height:12px; background:#fff; border-radius:50%;
  }
  
  .album-art {
  width:140px;
  height:140px;
  border-radius:14px;
  background:linear-gradient(135deg,#1a1a2e,#0f2a1a);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

.album-art img {
  width:100%;
  height:100%;
  object-fit:fill;
}

.album-art span {
  font-size:48px;
  opacity:.8;
}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/home">RevPlay</a>
</nav>
<div class="page">
  <a href="/home" class="back">← Back to Dashboard</a>
  <div class="hero">
   <div class="album-art">
  <img th:if="${album.coverImage != null}"
       th:src="${album.coverImage}"
       alt="Album Cover">
  <span th:unless="${album.coverImage != null}">💿</span>
</div>
    <div class="hero-info">
      <h1 th:text="${album.title}"></h1>
      <a class="artist" th:href="@{'/view/artist/' + ${album.artist.artistId}}" th:text="${album.artist.artistName}"></a>
      <p class="desc" th:text="${album.description}"></p>
      <span class="meta-pill">Released: <span th:text="${album.releaseDate}"></span></span>
    </div>
  </div>
  <p class="sec-title">Songs in this Album</p>
  <div class="songs-grid">
    <a th:each="song : ${songs}" th:href="@{'/view/songs/' + ${song.songId}}" class="song-card">
     <div class="thumb">
  
  <img th:if="${song.album != null and song.album.coverImage != null}"
       th:src="${song.album.coverImage}"
       alt="Cover"
       style="width:100%;height:100%;object-fit:fill;border-radius:6px;">
       
  <span th:unless="${song.album != null and song.album.coverImage != null}"
        style="font-size:18px;">♪</span>

</div>
      <div class="song-meta">
        <b th:text="${song.title}"></b>
        <span th:text="${song.genre}"></span>
      </div>
      <span class="plays" th:text="${song.playCount}"></span>
    </a>
  </div>
</div>


<div id="bp">
  <div class="bp-left">
    <div class="bp-art" id="bpArt">♪</div>
    <div>
      <div class="bp-song-title"  id="bpTitle">No song playing</div>
      <div class="bp-song-artist" id="bpArtist">—</div>
    </div>
  </div>
  <div class="bp-center">
    <div class="bp-btns">
      <button class="bp-btn"      id="bpRew">⏮</button>
      <button class="bp-play-btn" id="bpPlay">▶</button>
      <button class="bp-btn"      id="bpFwd">⏭</button>
    </div>
    <div class="bp-seek">
      <span id="bpCur">0:00</span>
      <div class="bp-bar" id="bpBar"><div class="bp-bar-fill" id="bpFill"></div></div>
      <span id="bpDur">0:00</span>
    </div>
  </div>
  <div class="bp-right">
    <button class="bp-vol-btn" id="bpVolBtn">🔊</button>
    <input type="range" class="bp-vol" id="bpVolSlider" min="0" max="1" step="0.02" value="1">
  </div>
</div>

<audio id="globalAudio" style="display:none"></audio>


<script>
(function () {
  const audio    = document.getElementById('globalAudio');
  const bp       = document.getElementById('bp');
  const bpPlay   = document.getElementById('bpPlay');
  const bpRew    = document.getElementById('bpRew');
  const bpFwd    = document.getElementById('bpFwd');
  const bpFill   = document.getElementById('bpFill');
  const bpCur    = document.getElementById('bpCur');
  const bpDur    = document.getElementById('bpDur');
  const bpBar    = document.getElementById('bpBar');
  const bpVolBtn = document.getElementById('bpVolBtn');
  const bpVolSl  = document.getElementById('bpVolSlider');
  const bpTitle  = document.getElementById('bpTitle');
  const bpArtist = document.getElementById('bpArtist');
  const bpArtEl  = document.getElementById('bpArt');

  function fmt(s) {
    if (!s||isNaN(s)) return '0:00';
    return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  }

  let state = {};
  try { state = JSON.parse(sessionStorage.getItem('revplay_player')||'{}'); } catch(e){}

  if (state.src) {
    audio.src    = state.src;
    audio.volume = state.volume ?? 1;
    bpVolSl.value = audio.volume;
    bpTitle.textContent  = state.title  || 'No song playing';
    bpArtist.textContent = state.artist || '—';
    bpArtEl.innerHTML    = state.cover  ? `<img src="${state.cover}">` : '♪';
    audio.addEventListener('loadedmetadata', () => {
      if (state.currentTime) audio.currentTime = state.currentTime;
      bpDur.textContent = fmt(audio.duration);
      if (state.playing) audio.play().catch(()=>{});
    }, { once: true });
  }

  function saveState() {
    sessionStorage.setItem('revplay_player', JSON.stringify({
      src: audio.src, title: bpTitle.textContent, artist: bpArtist.textContent,
      cover: state.cover||'', songId: state.songId,
      currentTime: audio.currentTime, volume: audio.volume, playing: !audio.paused
    }));
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime/audio.duration)*100;
    bpFill.style.width = pct+'%';
    bp.style.setProperty('--bp-pct', pct+'%');
    bpCur.textContent  = fmt(audio.currentTime);
    saveState();
  });
  audio.addEventListener('loadedmetadata', () => { bpDur.textContent = fmt(audio.duration); });
  audio.addEventListener('play',  () => { bpPlay.textContent='❚❚'; saveState(); });
  audio.addEventListener('pause', () => { bpPlay.textContent='▶';  saveState(); });
  audio.addEventListener('ended', () => { bpPlay.textContent='▶';  saveState(); });

  bpPlay.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());
  bpRew.addEventListener('click',  () => { audio.currentTime = Math.max(0,audio.currentTime-10); });
  bpFwd.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration||0,audio.currentTime+10); });
  bpBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = bpBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
  });

  let lastVol = 1;
  function setVol(v) {
    audio.volume   = Math.max(0,Math.min(1,v));
    bpVolSl.value  = audio.volume;
    bpVolBtn.textContent = audio.volume===0?'🔇':audio.volume<.5?'🔉':'🔊';
  }
  bpVolSl.addEventListener('input', e => setVol(parseFloat(e.target.value)));
  bpVolBtn.addEventListener('click', () => audio.volume>0?(lastVol=audio.volume,setVol(0)):setVol(lastVol));
})();
</script>
</body>
</html>
